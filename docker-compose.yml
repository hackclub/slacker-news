services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sn_cms
      POSTGRES_USER: sn_cms
      POSTGRES_PASSWORD: sn_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sn_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

  cms:
    image: slacker-news-cms:prod
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://sn_cms:sn_cms@postgres:5432/sn_cms
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://newsroom.matmanna.dev}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Set PAYLOAD_SECRET in .env}
      HACKCLUB_CLIENT_ID: ${HACKCLUB_CLIENT_ID}
      HACKCLUB_CLIENT_SECRET: ${HACKCLUB_CLIENT_SECRET}
      HACKCLUB_REDIRECT_URI: ${HACKCLUB_REDIRECT_URI:-https://newsroom.matmanna.dev/admin/auth/hackclub/callback}
      ASTRO_URL: http://web:80
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        CMS_URL: http://cms:3000
    environment:
      CMS_URL: http://cms:3000
    ports:
      - "8080:80"
    depends_on:
      - cms
    restart: unless-stopped

  cloudflared:
    profiles:
      - tunnel
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - cms
    restart: unless-stopped

volumes:
  postgres_data:
