<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  {%- seo -%}
  <link rel="icon" type="image/svg+xml" href="{{ "/SN H Logo.svg" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  <script>
    (function() {
      var stored = localStorage.getItem('dark-mode');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark-mode');
      }

      document.documentElement.style.colorScheme = document.documentElement.classList.contains('dark-mode') ? 'dark' : 'light';
    })();
  </script>
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;

      function syncColorScheme() {
        document.documentElement.style.colorScheme = document.documentElement.classList.contains('dark-mode') ? 'dark' : 'light';
        btn.textContent = document.documentElement.classList.contains('dark-mode') ? 'Light Mode' : 'Dark Mode';
      }

      syncColorScheme();

      btn.addEventListener('click', function(event) {
        event.preventDefault();
        document.documentElement.classList.toggle('dark-mode');
        localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark-mode'));
        syncColorScheme();
        x();
      });
    });
  </script>
  <script>
    window.addEventListener('load', function() {
      var wrapper = document.querySelector('.block-excerpts');
      if (!wrapper || wrapper.scrollHeight <= wrapper.clientHeight) return;

      var paras = Array.from(wrapper.querySelectorAll('.block-excerpt'));

      // Remove trailing paragraphs that don't fit at all
      while (paras.length > 1 && wrapper.scrollHeight > wrapper.clientHeight) {
        var last = paras[paras.length - 1];
        var prev = paras[paras.length - 2];
        // Check if removing the last paragraph would be enough
        last.style.display = 'none';
        if (wrapper.scrollHeight <= wrapper.clientHeight) {
          // Last paragraph partially fits — restore and truncate it instead
          last.style.display = '';
          break;
        }
        // Doesn't fit at all — remove it
        last.remove();
        paras.pop();
      }

      if (wrapper.scrollHeight <= wrapper.clientHeight) return;

      // Truncate the last paragraph word by word
      var last = paras[paras.length - 1];
      var words = last.textContent.split(/\s+/);

      while (wrapper.scrollHeight > wrapper.clientHeight && words.length > 1) {
        words.pop();
        last.textContent = words.join(' ') + '…';
      }

      // Try to end at a sentence boundary for a cleaner break
      var truncated = words.join(' ');
      var sentenceMatch = truncated.match(/^(.*[.!?])\s/);
      if (sentenceMatch && sentenceMatch[1].length > truncated.length * 0.6) {
        last.textContent = sentenceMatch[1];
        if (wrapper.scrollHeight > wrapper.clientHeight) {
          last.textContent = truncated + '…';
        }
      }
    });
  </script>
</head>
