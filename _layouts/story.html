---
layout: default
---

<article class="story-page">
  <header class="story-header">
    <h1 class="story-title">{{ page.title }}</h1>
    <div class="story-meta">
      <span>{% if page.author %}<span class="story-author">By {{ page.author }}</span> &mdash; {% endif %}
      <time>{{ page.date | date: "%B %-d, %Y" }}</time></span>
      {% if page.category %}<span class="story-category">{{ page.category | upcase }}</span>{% endif %}
    </div>
    <hr class="story-rule">
  </header>

  <div class="story-body">
    {{ content }}
  </div>

  <footer class="story-footer">
    <a href="{{ "/" | relative_url }}">&larr; Back to front page</a>
  </footer>
</article>
